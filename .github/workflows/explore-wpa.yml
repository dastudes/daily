name: Explore WPA Data

on:
  workflow_dispatch: # Manual trigger only — run once from the Actions tab, then delete this file

jobs:
  explore-wpa:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run WPA exploration script
        run: node explore-wpa.js
